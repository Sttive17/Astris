<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background card -->
  <rect x="30" y="30" width="740" height="540" rx="28" fill="var(--card)" stroke="var(--border)" stroke-width="3"/>
  
  <!-- Central hub/platform -->
  <circle cx="400" cy="300" r="80" fill="var(--primary)" opacity="0.12" stroke="var(--primary)" stroke-width="3"/>
  <circle cx="400" cy="300" r="50" fill="var(--primary)" opacity="0.18" stroke="var(--primary)" stroke-width="2.5"/>
  <text x="364" y="306" font-size="16" font-family="sans-serif" fill="var(--primary)" font-weight="700">ASTRIS</text>
  
  <!-- Node 1 - top left (company) -->
  <circle cx="220" cy="160" r="35" fill="var(--chart-1)" opacity="0.15" stroke="var(--foreground)" stroke-width="2.5"/>
  <!-- Building icon -->
  <rect x="207" y="148" width="26" height="24" rx="3" fill="var(--chart-1)" opacity="0.35" stroke="var(--foreground)" stroke-width="1.5"/>
  <rect x="207" y="152" width="26" height="8" fill="var(--chart-1)" opacity="0.2"/>
  <text x="195" y="125" font-size="12" font-family="sans-serif" fill="var(--foreground)" font-weight="600">Empresa</text>
  
  <!-- Node 2 - top right (candidate) -->
  <circle cx="580" cy="160" r="35" fill="var(--chart-4)" opacity="0.15" stroke="var(--foreground)" stroke-width="2.5"/>
  <!-- Person icon -->
  <circle cx="580" cy="148" r="8" fill="var(--chart-4)" opacity="0.35" stroke="var(--foreground)" stroke-width="1.5"/>
  <rect x="571" y="158" width="18" height="18" rx="5" fill="var(--chart-4)" opacity="0.35" stroke="var(--foreground)" stroke-width="1.5"/>
  <text x="550" y="125" font-size="12" font-family="sans-serif" fill="var(--foreground)" font-weight="600">Candidato/a</text>
  
  <!-- Node 3 - bottom (mentor) -->
  <circle cx="400" cy="500" r="35" fill="var(--chart-3)" opacity="0.15" stroke="var(--foreground)" stroke-width="2.5"/>
  <!-- Mentor star icon -->
  <text x="388" y="508" font-size="22" fill="var(--chart-3)" opacity="0.5">✦</text>
  <text x="378" y="545" font-size="12" font-family="sans-serif" fill="var(--foreground)" font-weight="600">Mentor/a</text>
  
  <!-- Connection lines (bridges) -->
  <!-- Company to Astris -->
  <path d="M250 175 Q320 220 360 260" stroke="var(--accent)" stroke-width="3" fill="none" stroke-dasharray="10 5" opacity="0.6"/>
  <!-- Candidate to Astris -->
  <path d="M550 175 Q480 220 440 260" stroke="var(--accent)" stroke-width="3" fill="none" stroke-dasharray="10 5" opacity="0.6"/>
  <!-- Astris to Mentor -->
  <path d="M400 350 L400 465" stroke="var(--accent)" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- Small matching dots on connections -->
  <circle cx="310" cy="212" r="5" fill="var(--accent)" opacity="0.6"/>
  <circle cx="490" cy="212" r="5" fill="var(--accent)" opacity="0.6"/>
  
  <!-- Match badge - floating -->
  <rect x="350" y="240" width="100" height="36" rx="12" fill="var(--accent)" opacity="0.2" stroke="var(--accent)" stroke-width="2"/>
  <text x="378" y="263" font-size="14" font-family="sans-serif" fill="var(--accent)" font-weight="700">94% match</text>
  
  <!-- Sparkles around matching -->
  <text x="260" y="250" font-size="18" fill="var(--accent)" opacity="0.4">✦</text>
  <text x="530" y="250" font-size="18" fill="var(--accent)" opacity="0.4">✦</text>
  <text x="400" y="420" font-size="16" fill="var(--primary)" opacity="0.35">✦</text>
  
  <!-- Small nodes representing more candidates/companies -->
  <circle cx="150" cy="340" r="15" fill="var(--chart-4)" opacity="0.12" stroke="var(--border)" stroke-width="1.5"/>
  <circle cx="650" cy="340" r="15" fill="var(--chart-1)" opacity="0.12" stroke="var(--border)" stroke-width="1.5"/>
  <circle cx="250" cy="460" r="12" fill="var(--chart-4)" opacity="0.1" stroke="var(--border)" stroke-width="1.5"/>
  <circle cx="550" cy="460" r="12" fill="var(--chart-1)" opacity="0.1" stroke="var(--border)" stroke-width="1.5"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background card -->
  <rect x="30" y="30" width="740" height="540" rx="28" fill="var(--card)" stroke="var(--border)" stroke-width="3"/>
  
  <!-- Desk/table -->
  <rect x="200" y="340" width="400" height="28" rx="8" fill="var(--muted)" stroke="var(--foreground)" stroke-width="3"/>
  <rect x="230" y="368" width="18" height="80" rx="4" fill="var(--muted)" stroke="var(--foreground)" stroke-width="2.5"/>
  <rect x="552" y="368" width="18" height="80" rx="4" fill="var(--muted)" stroke="var(--foreground)" stroke-width="2.5"/>

  <!-- Laptop screen -->
  <rect x="270" y="170" width="260" height="170" rx="10" fill="var(--background)" stroke="var(--foreground)" stroke-width="3.5"/>
  <!-- Screen content - code/doc lines -->
  <rect x="290" y="195" width="140" height="10" rx="4" fill="var(--accent)" opacity="0.5"/>
  <rect x="290" y="215" width="100" height="10" rx="4" fill="var(--muted-foreground)" opacity="0.4"/>
  <rect x="290" y="235" width="180" height="10" rx="4" fill="var(--muted-foreground)" opacity="0.3"/>
  <rect x="290" y="255" width="120" height="10" rx="4" fill="var(--accent)" opacity="0.4"/>
  <rect x="290" y="275" width="160" height="10" rx="4" fill="var(--muted-foreground)" opacity="0.3"/>
  <rect x="290" y="295" width="90" height="10" rx="4" fill="var(--muted-foreground)" opacity="0.25"/>
  <!-- Progress bar on screen -->
  <rect x="290" y="315" width="200" height="14" rx="7" fill="var(--muted)" stroke="var(--border)" stroke-width="1.5"/>
  <rect x="290" y="315" width="140" height="14" rx="7" fill="var(--accent)"/>

  <!-- Person - simplified cartoon style -->
  <!-- Head -->
  <circle cx="400" cy="110" r="40" fill="var(--accent)" opacity="0.25" stroke="var(--foreground)" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="386" cy="105" r="5" fill="var(--foreground)"/>
  <circle cx="414" cy="105" r="5" fill="var(--foreground)"/>
  <!-- Smile -->
  <path d="M388 120 Q400 132 412 120" stroke="var(--foreground)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Body -->
  <rect x="360" y="150" width="80" height="70" rx="18" fill="var(--primary)" opacity="0.3" stroke="var(--foreground)" stroke-width="3"/>
  
  <!-- Arms reaching to keyboard -->
  <path d="M360 180 L310 240 L290 310" stroke="var(--foreground)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M440 180 L490 240 L510 310" stroke="var(--foreground)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Hands -->
  <circle cx="290" cy="315" r="10" fill="var(--accent)" opacity="0.3" stroke="var(--foreground)" stroke-width="2.5"/>
  <circle cx="510" cy="315" r="10" fill="var(--accent)" opacity="0.3" stroke="var(--foreground)" stroke-width="2.5"/>

  <!-- Floating elements - stars/sparkles -->
  <text x="160" y="150" font-size="28" fill="var(--accent)" opacity="0.4">✦</text>
  <text x="600" y="130" font-size="20" fill="var(--primary)" opacity="0.35">✦</text>
  <text x="180" y="260" font-size="16" fill="var(--accent)" opacity="0.3">✦</text>
  
  <!-- Lightbulb above head -->
  <path d="M415 55 Q430 30 445 55 Q445 68 435 72 L435 78 L420 78 L420 72 Q410 68 415 55Z" fill="var(--primary)" opacity="0.2" stroke="var(--accent)" stroke-width="2"/>
</svg>